<body>

    <!--header inicio-->
    <div class="header">
        <div class="container">
            <h1 class="titulo">IGC</h1>

                <li>
                    <a href="./index.html">Inicial</a>

            </ul>

    </div>
    <div class="simulador">
        <div class="container">
            <p>nome</p>
            <input type="text" id="nome">
            <p>tag</p>
            <input type="text" id="tags">
            <p>imagem</p>
            <input type="text" id="imagem">
            <button onclick="cadastrar2()">Cadastrar</button>
        </div>
    </div>
</body>

</html>
<script>
    function cadastrar2() {
        var nomeVar = nome.value;
        var tagVar = tags.value;
        var imagemVar = imagem.value;
        var idUsuario = sessionStorage.ID_USUARIO;
        fetch("/jogos/cadastrar2", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                tagServer: tagVar,
                imagemServer: imagemVar,
                idUsuarioServer: idUsuario
            })
        })
            .then(function (resposta) {
                if (resposta.ok) {

                    alert("Jogo cadastrado com sucesso!");
                } else {
                    alert("Erro ao cadastrar.");
                }
            });
    }
</script>
