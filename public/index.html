<script>

fetch("/jogos/dashboard")
.then(res => res.json())
.then(dados=>{
    kpiJogos.innerHTML = dados.totalJogos;
    kpiUsuarios.innerHTML = dados.totalUsuarios;
    kpiTag.innerHTML = dados.tagMaisUsada;
    new Chart(graficoRosca,{
        type:'doughnut',
        data:{
            labels:dados.tags,
            datasets:[{
                data:dados.quantidadeTags,
                borderWidth:1
            }]
        }
    });
    new Chart(graficoBarra,{
        type:'bar',
        data:{
            labels:dados.jogos,
            datasets:[{
                label:'Quantidade',
                data:dados.quantidadeJogos
            }]
        },
        options:{
            indexAxis:'y'
        }
    });
});
</script>
